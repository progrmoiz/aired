name = "aired"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../web"
# Worker handles routing first; static assets accessed via env.ASSETS.fetch
# in the notFound handler. Required so /dashboard and other auth-gated
# routes can run their handler before the static asset is served.
run_worker_first = true
binding = "ASSETS"

[[r2_buckets]]
binding = "PAGES_BUCKET"
bucket_name = "aired-pages"

[[kv_namespaces]]
binding = "PAGES_KV"
id = "6388d6b3b6c04fe5ad8529ae029e723e"

# Custom domain
[[routes]]
pattern = "aired.sh/*"
zone_name = "aired.sh"

[[routes]]
pattern = "aired.sh"
zone_name = "aired.sh"
