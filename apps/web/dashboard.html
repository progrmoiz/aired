<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aired — dashboard</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @keyframes skeleton-pulse {
      from { opacity: 1; }
      to { opacity: 0.4; }
    }

    .skeleton-row {
      animation: skeleton-pulse 1.2s linear infinite alternate;
    }

    @media (prefers-reduced-motion: reduce) {
      .skeleton-row { animation: none; opacity: 0.7; }
    }

    .row-action-btn {
      transition: color 120ms cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 120ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .row-link {
      transition: color 120ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    .row-link:hover {
      text-decoration: underline;
      text-decoration-color: #3b3b40;
      text-underline-offset: 3px;
    }

    /* Copied state — DESIGN.md §8.2: green text + green border, no fill change */
    .row-action-copied {
      color: #34d399;
      border-color: rgba(52, 211, 153, 0.3);
    }

    /* Delete confirm — stronger signal: primary text + outlined border */
    .row-action-confirm {
      color: #ededef;
      border-color: #3b3b40;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body class="bg-aired-bg min-h-screen text-aired-text-primary">

  <!-- ─── Top nav (matches /, /docs.html) ─── -->
  <header class="w-full px-6 h-14 flex items-center justify-between max-w-2xl mx-auto">
    <a href="/" class="text-base font-semibold tracking-tight text-aired-text-primary hover:text-white transition-colors duration-150">aired</a>
    <nav class="flex items-center gap-5 text-sm text-aired-text-secondary">
      <a href="/docs.html" class="hover:text-aired-text-primary transition-colors duration-150">Docs</a>
      <a href="https://github.com/progrmoiz/aired" target="_blank" rel="noopener"
         class="flex items-center gap-1.5 hover:text-aired-text-primary transition-colors duration-150">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
      <button id="sign-out" type="button" class="text-aired-text-tertiary hover:text-aired-text-primary transition-colors duration-150 focus-ring rounded-sm">sign out</button>
    </nav>
  </header>

  <main class="max-w-2xl mx-auto px-6 py-12">

    <!-- hero: handle + count + publish link -->
    <section class="mb-10 flex items-end justify-between gap-4">
      <div class="min-w-0">
        <h1 id="user-handle" class="text-xl font-medium tracking-tight text-aired-text-primary truncate">@</h1>
        <p id="page-count" class="text-sm text-aired-text-secondary mt-1" aria-live="polite">&nbsp;</p>
      </div>
      <a href="/" class="text-sm text-aired-text-secondary hover:text-aired-text-primary transition-colors duration-150 focus-ring rounded-sm whitespace-nowrap">Publish another →</a>
    </section>

    <!-- page list -->
    <ul id="page-list" class="divide-y divide-aired-border" aria-label="Published pages">
      <!-- skeleton rows match real row layout: title + (id · age) | views | Copy | Delete -->
      <li class="skeleton-row flex items-center gap-3 min-h-[44px] py-3">
        <div class="flex-1 min-w-0 flex flex-col gap-1.5">
          <div class="h-3 w-48 rounded-sm bg-aired-surface-hover"></div>
          <div class="h-2.5 w-32 rounded-sm bg-aired-surface-hover"></div>
        </div>
        <div class="h-3 w-12 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-8 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-10 rounded-sm bg-aired-surface-hover"></div>
      </li>
      <li class="skeleton-row flex items-center gap-3 min-h-[44px] py-3" style="animation-delay: 0.2s;">
        <div class="flex-1 min-w-0 flex flex-col gap-1.5">
          <div class="h-3 w-36 rounded-sm bg-aired-surface-hover"></div>
          <div class="h-2.5 w-24 rounded-sm bg-aired-surface-hover"></div>
        </div>
        <div class="h-3 w-12 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-8 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-10 rounded-sm bg-aired-surface-hover"></div>
      </li>
      <li class="skeleton-row flex items-center gap-3 min-h-[44px] py-3" style="animation-delay: 0.4s;">
        <div class="flex-1 min-w-0 flex flex-col gap-1.5">
          <div class="h-3 w-56 rounded-sm bg-aired-surface-hover"></div>
          <div class="h-2.5 w-28 rounded-sm bg-aired-surface-hover"></div>
        </div>
        <div class="h-3 w-12 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-8 rounded-sm bg-aired-surface-hover"></div>
        <div class="h-3 w-10 rounded-sm bg-aired-surface-hover"></div>
      </li>
    </ul>

    <!-- live region for action results (Copied, Deleted) -->
    <div id="action-status" class="sr-only" role="status" aria-live="polite"></div>

  </main>

  <script src="/dashboard.js" defer></script>
</body>
</html>
