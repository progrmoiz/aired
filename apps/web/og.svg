<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="80%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#7c6aef" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#7c6aef" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Broadcast beacon — prominent -->
  <g transform="translate(820, 100) scale(8)">
    <circle cx="9" cy="23" r="3.5" fill="#7c6aef" opacity="0.4"/>
    <path d="M9 13 A10 10 0 0 1 19 23" fill="none" stroke="#7c6aef" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
    <path d="M9 6 A17 17 0 0 1 26 23" fill="none" stroke="#7c6aef" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="112" font-weight="600" fill="#ededef" letter-spacing="-0.04em">aired</text>

  <!-- Tagline -->
  <text x="104" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#8a8a8e" letter-spacing="-0.01em">Publish HTML artifacts to shareable URLs.</text>

  <!-- Terminal block -->
  <rect x="100" y="320" width="640" height="68" rx="10" fill="#111113" stroke="#222225" stroke-width="1.5"/>
  <text x="132" y="363" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" fill="#56565a">$</text>
  <text x="160" y="363" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" fill="#7c6aef">npx aired dashboard.html</text>

  <!-- Result -->
  <rect x="100" y="400" width="640" height="56" rx="10" fill="#111113" stroke="#222225" stroke-width="1.5"/>
  <text x="132" y="437" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#56565a">→</text>
  <text x="162" y="437" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#ededef">https://aired.sh/p/a1b2c3d4e5</text>

  <!-- URL bottom right -->
  <text x="1100" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#7c6aef" text-anchor="end">aired.sh</text>
</svg>
